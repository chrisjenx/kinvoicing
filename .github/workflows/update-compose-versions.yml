name: Update Compose Versions

on:
  schedule:
    - cron: '0 10 * * 1' # Monday 10am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Detect latest Compose Multiplatform versions
        id: detect
        run: |
          set -euo pipefail

          METADATA_URL="https://repo1.maven.org/maven2/org/jetbrains/compose/org.jetbrains.compose.gradle.plugin/maven-metadata.xml"
          ALL_VERSIONS=$(curl -sf --retry 3 --max-time 30 "$METADATA_URL" | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')

          if [ -z "$ALL_VERSIONS" ]; then
            echo "ERROR: No CMP versions fetched from Maven Central"
            exit 1
          fi

          STABLE_VERSIONS=$(echo "$ALL_VERSIONS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true)
          PRERELEASE_VERSIONS=$(echo "$ALL_VERSIONS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc|dev)' || true)

          LATEST_STABLE=$(echo "$STABLE_VERSIONS" | sort -t. -k1,1n -k2,2n -k3,3n | \
            awk -F. '{ key=$1"."$2; versions[key]=$0 } END { for (k in versions) print versions[k] }' | \
            sort -t. -k1,1n -k2,2n | tail -3)

          HIGHEST_MINOR=$(echo "$ALL_VERSIONS" | sort -t. -k1,1rn -k2,2rn | head -1 | awk -F. '{print $1"."$2}')
          HIGHEST_STABLE_MINOR=$(echo "$STABLE_VERSIONS" | sort -t. -k1,1rn -k2,2rn | head -1 | awk -F. '{print $1"."$2}')

          PRERELEASE_ENTRY=""
          if [ "$HIGHEST_MINOR" != "$HIGHEST_STABLE_MINOR" ]; then
            PRERELEASE_ENTRY=$(echo "$PRERELEASE_VERSIONS" | grep "^${HIGHEST_MINOR}\." | sort -V | tail -1)
          fi

          if [ -n "$PRERELEASE_ENTRY" ]; then
            MATRIX_VERSIONS=$(echo "$LATEST_STABLE" | tail -2)
            MATRIX_VERSIONS=$(printf "%s\n%s" "$MATRIX_VERSIONS" "$PRERELEASE_ENTRY")
          else
            MATRIX_VERSIONS="$LATEST_STABLE"
          fi

          KOTLIN_URL="https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/maven-metadata.xml"
          LATEST_KOTLIN=$(curl -sf --retry 3 --max-time 30 "$KOTLIN_URL" | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | \
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)

          if [ -z "$LATEST_KOTLIN" ]; then
            echo "ERROR: No Kotlin version fetched from Maven Central"
            exit 1
          fi

          echo "Detected CMP versions:"
          echo "$MATRIX_VERSIONS"
          echo "Latest Kotlin: $LATEST_KOTLIN"

          JSON='{"versions":['
          FIRST=true
          while IFS= read -r ver; do
            [ -z "$ver" ] && continue
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="$JSON,"
            fi
            JSON="$JSON{\"compose-version\":\"$ver\",\"kotlin-version\":\"$LATEST_KOTLIN\"}"
          done <<< "$MATRIX_VERSIONS"
          JSON="$JSON]}"

          echo "$JSON" | jq . > .github/compose-versions.json
          echo "Generated matrix:"
          cat .github/compose-versions.json

          # The published library ships one binary per module — pin its build base to
          # the highest STABLE detected Compose version (never a pre-release) + the
          # latest Kotlin, so we always ship against the currently-released CMP. The
          # docs-regeneration step below picks up the new pin.
          BASE_COMPOSE=$(echo "$LATEST_STABLE" | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ -z "$BASE_COMPOSE" ]; then
            echo "ERROR: no stable Compose version detected for the build base"
            exit 1
          fi
          echo "Build base -> Compose $BASE_COMPOSE + Kotlin $LATEST_KOTLIN"
          perl -i -pe "s/^compose-multiplatform = .*/compose-multiplatform = \"$BASE_COMPOSE\"/" gradle/libs.versions.toml
          perl -i -pe "s/^kotlin = .*/kotlin = \"$LATEST_KOTLIN\"/" gradle/libs.versions.toml

          # Change gate: fire on a diff in the matrix JSON OR the build-base pin.
          # (Docs regenerate in a later step; docs-sync CI is the gate that catches drift.)
          if git diff --quiet .github/compose-versions.json gradle/libs.versions.toml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
            cat .github/compose-versions.json >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate compatibility tables in docs + README
        if: steps.detect.outputs.changed == 'true'
        # Never let a docs-regeneration hiccup block the version-bump PR; the build
        # workflow's docs-sync check is the gate that surfaces a stale/broken table.
        continue-on-error: true
        run: python3 .github/scripts/render-compat-tables.py

      - name: Create Pull Request
        if: steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "Update Compose Multiplatform compatibility matrix"
          body: |
            Auto-detected new Compose Multiplatform versions from Maven Central.

            Updated matrix:
            ```json
            ${{ steps.detect.outputs.matrix }}
            ```

            This PR also bumps the shipped build base in `gradle/libs.versions.toml` to the
            latest stable Compose/Kotlin (each module ships one binary, built against the
            currently-released CMP). The compatibility tables in `docs/compatibility.md` and
            `README.md` have been regenerated from the matrix and the new pin.

            The compatibility CI will run on this PR to verify the shipped binaries run against
            every version in the matrix. If a stable version fails, drop it from
            `.github/compose-versions.json` (or change the base) before merging; pre-release
            failures are informational.
          branch: auto/update-compose-versions
          labels: dependencies
          commit-message: "Update Compose Multiplatform compatibility matrix"
