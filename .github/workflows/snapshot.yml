name: Snapshot Publish

on:
  push:
    branches: [main]
    paths:
      - 'core/src/**/*.kt'
      - 'render-compose/src/**/*.kt'
      - 'render-html-email/src/**/*.kt'
      - 'render-pdf/src/**/*.kt'
      - 'render-html/src/**/*.kt'
      - 'core/build.gradle.kts'
      - 'render-compose/build.gradle.kts'
      - 'render-html-email/build.gradle.kts'
      - 'render-pdf/build.gradle.kts'
      - 'render-html/build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/libs.versions.toml'
      - 'build.gradle.kts'

permissions:
  contents: read

concurrency:
  group: snapshot-publish
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Verify SNAPSHOT version
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          echo "Version: $VERSION"
          if [[ ! "$VERSION" =~ -SNAPSHOT$ ]]; then
            echo "::error::Version '$VERSION' is not a SNAPSHOT. Use the Release workflow instead."
            exit 1
          fi

      - name: Build and test
        run: ./gradlew assemble jvmTest

      - name: Publish snapshot
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
