name: Compose Compatibility

on:
  pull_request:
    paths:
      - '.github/compose-versions.json'
      - '.github/workflows/compatibility.yml'
      - 'gradle/libs.versions.toml'
      - 'core/**'
      - 'render-compose/**'
      - 'render-html/**'
      - 'render-pdf/**'
      - 'compat-consumer/**'
      - 'build-logic/**'
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: load
        run: echo "matrix=$(jq -c '.versions' .github/compose-versions.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: load-versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ${{ fromJson(needs.load-versions.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    name: CMP ${{ matrix.version.compose-version }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          # Match the release/build.yml JDK (17) so the compat-published jars are the
          # same bytecode users get; the compat-consumer's jvmToolchain(17) resolves this
          # installed JDK with no auto-provision.
          java-version: 17

      # macos-latest default Xcode lacks the UIUtilities framework that
      # CMP 1.11+ auto-links from compose.ui-uikit.
      - if: matrix.os == 'macos-latest'
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      # Publish the SHIPPED JVM renderer binaries to mavenLocal at the pinned BASE
      # Compose version — this runs BEFORE the perl override, so the jars are the
      # ones users actually get, not recompiled against the cell. The compat-consumer
      # then forces the Compose group to the cell version to prove the base binaries
      # survive the runtime reshape.
      #
      #   * KMP modules (core / render-compose / render-pdf): publish ONLY the
      #     Linux-buildable JVM + root-metadata publications. Full publishToMavenLocal
      #     would drag in iOS/macOS/native publications that don't build on ubuntu.
      #   * render-html is kotlin.jvm, so publishToMavenLocal is the whole module.
      #   * -PVERSION_NAME=0.0.0-compat-SNAPSHOT: the -SNAPSHOT suffix makes the
      #     vanniktech maven-publish plugin treat signing as NOT required
      #     (setRequired(!version.endsWith("-SNAPSHOT"))), so with no GPG key on the
      #     runner the sign* tasks skip cleanly instead of failing. (There is no
      #     working RELEASE_SIGNING_ENABLED gate in this plugin version.)
      - name: Publish shipped renderers to mavenLocal (base CMP)
        run: |
          set -euo pipefail
          ./gradlew \
            :core:publishJvmPublicationToMavenLocal :core:publishKotlinMultiplatformPublicationToMavenLocal \
            :render-compose:publishJvmPublicationToMavenLocal :render-compose:publishKotlinMultiplatformPublicationToMavenLocal \
            :render-pdf:publishJvmPublicationToMavenLocal :render-pdf:publishKotlinMultiplatformPublicationToMavenLocal \
            :render-html:publishToMavenLocal \
            -PVERSION_NAME=0.0.0-compat-SNAPSHOT --no-configuration-cache

      - name: Override versions
        run: |
          set -euo pipefail
          perl -i -pe '
            s/^kotlin = ".*"/kotlin = "${{ matrix.version.kotlin-version }}"/;
            s/^compose-multiplatform = ".*"/compose-multiplatform = "${{ matrix.version.compose-version }}"/;
          ' gradle/libs.versions.toml
          grep -qE "^kotlin = \"${{ matrix.version.kotlin-version }}\"$" gradle/libs.versions.toml
          grep -qE "^compose-multiplatform = \"${{ matrix.version.compose-version }}\"$" gradle/libs.versions.toml
          echo "Testing CMP ${{ matrix.version.compose-version }} + Kotlin ${{ matrix.version.kotlin-version }}"
          grep -E '^(kotlin|compose-multiplatform) = ' gradle/libs.versions.toml

      - name: Assemble + JVM/wasmJs tests
        # Avoid Android testDebugUnitTest (BitmapFactory needs Robolectric).
        # Prerelease CMP pulls preview androidx artifacts whose AAR metadata demands
        # a compileSdk we don't ship yet (1.12 alphas need 37) — skip the Android
        # target for prereleases; JVM/wasmJs (and iOS on macOS) still build and test.
        run: |
          TASKS=(:render-compose:assemble :render-compose:jvmTest :render-compose:wasmJsNodeTest)
          if [[ "${{ matrix.version.compose-version }}" == *-* ]]; then
            TASKS=(:render-compose:jvmJar :render-compose:jvmTest :render-compose:wasmJsNodeTest)
          fi
          ./gradlew "${TASKS[@]}" --no-configuration-cache

      - name: iOS simulator tests
        if: matrix.os == 'macos-latest'
        run: ./gradlew :render-compose:iosSimulatorArm64Test --no-configuration-cache

      # Run the standalone compat-consumer against the SHIPPED jars in mavenLocal,
      # forcing the Compose group to this cell. This exercises the published
      # render-html / render-pdf binaries (built at the base above) on the cell's
      # Compose runtime — the reshape a real downstream user would hit. Skia renders
      # offscreen, so ubuntu needs a virtual display (xvfb); macOS does not.
      # Prerelease cells stay non-blocking (Task 6 finalizes enforcement).
      - name: Consume shipped renderers on CMP ${{ matrix.version.compose-version }}
        continue-on-error: ${{ contains(matrix.version.compose-version, '-') }}
        run: |
          # ubuntu renders Skia offscreen and needs a virtual display; macOS does not.
          PREFIX=""
          [ "${{ matrix.os }}" = "ubuntu-latest" ] && PREFIX="xvfb-run --auto-servernum"
          $PREFIX ./gradlew -p compat-consumer run \
            -PcomposeVersion=${{ matrix.version.compose-version }} \
            -PkotlinVersion=${{ matrix.version.kotlin-version }} \
            -PkinvoicingVersion=0.0.0-compat-SNAPSHOT --no-configuration-cache

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-${{ matrix.version.compose-version }}-${{ matrix.os }}
          path: '**/build/reports/tests/'
          retention-days: 7

  compat-gate:
    name: Compose Compatibility CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - load-versions
      - test
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "  load-versions: ${{ needs.load-versions.result }}"
          echo "  test:          ${{ needs.test.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
