name: Build

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  assemble:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Build all targets
        run: ./gradlew assemble

  jvm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: JVM tests
        # :fidelity-test:jvmTest runs in the dedicated `fidelity-tests` matrix
        # job (macOS + Linux). Excluding here avoids a redundant double-run.
        run: ./gradlew jvmTest -x :fidelity-test:jvmTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jvm-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  apple-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: iOS simulator tests
        run: ./gradlew iosSimulatorArm64Test

      - name: macOS native tests
        run: ./gradlew macosArm64Test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apple-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  wasm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: wasmJs tests
        run: ./gradlew wasmJsTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Linux native tests
        run: ./gradlew :core:linuxX64Test :render-html-email:linuxX64Test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  fidelity-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      # Skiko on the GH-hosted ubuntu-latest image SIGSEGVs in
      # SkPixmap::getColor without the runtime fonts / fontconfig data it
      # expects. Installing dejavu + fontconfig fixes this at the source so
      # we get Linux fidelity coverage in addition to macOS. See #6.
      - name: Install Linux system fonts (skiko prerequisite)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu \
            fontconfig \
            libfreetype6 \
            libfontconfig1
          fc-cache -f -v

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Fidelity tests
        run: ./gradlew :fidelity-test:jvmTest :kinvoicing-fidelity-test:test

      - name: Upload fidelity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fidelity-report-${{ matrix.os }}
          path: 'kinvoicing-fidelity-test/build/reports/fidelity/'
          retention-days: 14

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fidelity-test-reports-${{ matrix.os }}
          path: '**/build/reports/tests/'
          retention-days: 7

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - assemble
      - jvm-tests
      - apple-tests
      - wasm-tests
      - linux-tests
      - fidelity-tests
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "  assemble:       ${{ needs.assemble.result }}"
          echo "  jvm-tests:      ${{ needs.jvm-tests.result }}"
          echo "  apple-tests:    ${{ needs.apple-tests.result }}"
          echo "  wasm-tests:     ${{ needs.wasm-tests.result }}"
          echo "  linux-tests:    ${{ needs.linux-tests.result }}"
          echo "  fidelity-tests: ${{ needs.fidelity-tests.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
