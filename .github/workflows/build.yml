name: Build

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Build all targets
        run: ./gradlew assemble

      - name: JVM tests
        run: ./gradlew jvmTest

      - name: iOS simulator tests
        run: ./gradlew iosSimulatorArm64Test

      - name: wasmJs tests
        run: ./gradlew wasmJsTest

      - name: macOS native tests
        run: ./gradlew macosArm64Test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  fidelity-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Fidelity tests
        run: ./gradlew :fidelity-test:jvmTest :kinvoicing-fidelity-test:test

      - name: Upload fidelity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fidelity-report
          path: 'kinvoicing-fidelity-test/build/reports/fidelity/'
          retention-days: 14

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fidelity-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7
